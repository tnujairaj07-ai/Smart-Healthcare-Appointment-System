<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Find Doctors | NovaCare OS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="app-shell">
  <header class="app-navbar">
    <div class="app-brand">
      <div class="app-logo"></div>
      <span class="app-title">NovaCare OS</span>
    </div>
    <nav class="app-nav-links">
      <a href="patient_dashboard.html">Dashboard</a>
      <a href="find_doctors.html">Find doctors</a>
      <a href="book_appointment.html">Book appointment</a>
    </nav>
  </header>

  <main class="app-main">
    <header class="page-header">
      <h1 class="page-title">Find a doctor</h1>
      <p class="page-subtitle">Filter by specialty, location, and availability.</p>
    </header>

    <section class="section-block">
      <div class="glass-card card card-tilt" style="margin-bottom:18px;">
        <form id="doctor-search-form" class="grid-3">
          <div class="input-row">
            <label class="input-label" for="specialty">Specialty</label>
            <select id="specialty" class="input-field">
              <option value="">Any</option>
              <option value="cardiology">Cardiology</option>
              <option value="general">General medicine</option>
              <option value="pulmonology">Pulmonology</option>
              <option value="neurology">Neurology</option>
            </select>
          </div>
          <div class="input-row">
            <label class="input-label" for="location">Location</label>
            <input id="location" class="input-field" placeholder="Example: Gurugram">
          </div>
          <div class="input-row">
            <label class="input-label" for="mode">Mode</label>
            <select id="mode" class="input-field">
              <option value="">Any</option>
              <option value="online">Online</option>
              <option value="clinic">Clinic</option>
            </select>
          </div>
          <div style="grid-column:1 / -1; margin-top:10px;">
            <button type="submit" class="btn btn-primary">Search doctors</button>
          </div>
        </form>
      </div>

      <div id="doctor-results" class="grid-3">
        <!-- doctor_match.js can render cards here -->
        <article class="glass-card card card-tilt">
          <p class="section-eyebrow">Cardiology · Gurugram</p>
          <h3>Dr. Sharma</h3>
          <p class="page-subtitle">15+ years experience · Online & clinic.</p>
          <div style="margin-top:10px; display:flex; gap:8px;">
            <span class="badge badge-success">Highly rated</span>
            <a href="book_appointment.html" class="btn btn-outline">Book</a>
          </div>
        </article>
      </div>
    </section>
  </main>
</div>

<script src="js/doctor_match.js"></script>
</body>
</html>
